<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempos & Trocas — Guia de Matchups do Jax</title>
<meta name="description" content="Planilha 2026 interativa de matchups do Jax top: cooldowns, tempos de troca e runas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0c16;
    --bg-alt:#150f22;
    --surface:#1c1730;
    --surface-2:#251e3c;
    --line: rgba(233,224,255,0.08);
    --line-strong: rgba(233,224,255,0.16);
    --text:#f1ece2;
    --text-dim:#b8adcf;
    --text-faint:#7a6e97;
    --brass:#cf9b46;
    --brass-soft: rgba(207,155,70,0.16);
    --q:#e2694b;
    --w:#d9b45c;
    --e:#55d6c2;
    --r:#9c8bef;
    --p:#7c8fb0;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(156,139,239,0.14), transparent 60%),
      radial-gradient(900px 500px at 0% 100%, rgba(207,155,70,0.10), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  ::selection{ background: var(--brass-soft); color:var(--text); }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--surface-2); border-radius:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  a{color:inherit;}

  .app{
    display:grid;
    grid-template-columns: 320px 1fr;
    min-height:100vh;
  }

  /* ---------- Header (spans full width, sits above grid via body flex) ---------- */
  .topbar{
    grid-column: 1 / -1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:16px 28px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .site-logo{
    height:48px;
    width:auto;
    flex-shrink:0;
    filter: drop-shadow(0 2px 10px rgba(156,139,239,0.25));
  }
  .brand{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .jax-portrait{
    width:56px; height:56px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid var(--brass);
    box-shadow: 0 4px 18px rgba(207,155,70,0.25);
    flex-shrink:0;
  }
  .jax-portrait img{
    width:100%; height:100%;
    object-fit:cover;
    object-position: 50% 22%;
    display:block;
  }
  .brand-title{
    display:flex;
    align-items:baseline;
    gap:14px;
  }
  .brand .mark{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.14em;
    color:var(--bg);
    background:var(--brass);
    padding:4px 8px;
    border-radius:5px;
  }
  .brand h1{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:22px;
    letter-spacing:0.02em;
    margin:0;
    text-transform:uppercase;
  }
  .brand h1 span{ color:var(--brass); }
  .topbar .tagline{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--text-faint);
    letter-spacing:0.03em;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:0;
    background: linear-gradient(180deg, var(--bg-alt), transparent 300px);
  }
  .search-wrap{
    padding:18px 18px 12px 18px;
  }
  .search-wrap input{
    width:100%;
    background:var(--surface);
    border:1px solid var(--line-strong);
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:11px 14px;
    border-radius:10px;
    outline:none;
    transition: border-color .15s ease;
  }
  .search-wrap input:focus{ border-color:var(--brass); }
  .search-wrap input::placeholder{ color:var(--text-faint); }

  .count-row{
    display:flex;
    justify-content:space-between;
    padding:0 18px 10px 18px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.04em;
  }

  .roster{
    overflow-y:auto;
    flex:1;
    padding: 2px 10px 20px 10px;
  }
  .champ-btn{
    width:100%;
    display:flex;
    align-items:center;
    gap:12px;
    background:transparent;
    border:1px solid transparent;
    border-radius:10px;
    padding:9px 10px;
    text-align:left;
    cursor:pointer;
    color:var(--text-dim);
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    margin-bottom:2px;
    transition: background .12s ease, color .12s ease, border-color .12s ease;
  }
  .champ-btn:hover{ background:var(--surface); color:var(--text); }
  .champ-btn.active{
    background:var(--surface-2);
    border-color: var(--line-strong);
    color:var(--text);
  }
  .champ-btn .num{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-faint);
    width:20px;
    flex-shrink:0;
  }
  .champ-btn.active .num{ color:var(--brass); }
  .champ-icon{
    width:30px; height:30px;
    border-radius:7px;
    object-fit:cover;
    flex-shrink:0;
    border:1px solid var(--line);
    background:var(--bg-alt);
  }
  .champ-btn.active .champ-icon{ border-color:var(--brass); }
  .champ-btn .name{ flex:1; font-weight:500; letter-spacing:0.01em; }
  .champ-btn .tagchip{
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px;
    color:var(--text-faint);
    border:1px solid var(--line);
    padding:2px 6px;
    border-radius:99px;
    white-space:nowrap;
    display:none;
  }
  .no-results{
    padding:24px 14px;
    color:var(--text-faint);
    font-size:13.5px;
    text-align:center;
  }

  /* ---------- Main ---------- */
  main{
    padding: 28px 40px 60px 40px;
    min-width:0;
  }
  .detail{
    max-width:920px;
  }

  .hero{
    position:relative;
    border-radius: var(--radius);
    overflow:hidden;
    background-size:cover;
    background-position: center 20%;
    border:1px solid var(--line);
    margin-bottom:26px;
    min-height:200px;
    display:flex;
    align-items:flex-end;
  }
  .hero-overlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(14,12,22,0.15) 0%, rgba(14,12,22,0.55) 55%, rgba(14,12,22,0.94) 100%),
      linear-gradient(90deg, rgba(14,12,22,0.75) 0%, rgba(14,12,22,0.15) 55%);
  }
  .detail-head{
    position:relative;
    z-index:1;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
    width:100%;
    padding:26px 26px 20px 26px;
  }
  .detail-head .id{
    font-family:'JetBrains Mono', monospace;
    color:var(--brass);
    font-size:13px;
    letter-spacing:0.08em;
    margin-bottom:6px;
    display:block;
  }
  .detail-head h2{
    font-family:'Oswald', sans-serif;
    font-size:44px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.01em;
    margin:0;
    line-height:1;
    text-shadow: 0 2px 18px rgba(0,0,0,0.6);
  }
  .detail-head .id{ text-shadow: 0 2px 10px rgba(0,0,0,0.7); }
  .badge-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .badge{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    padding:6px 11px;
    border-radius:99px;
    border:1px solid var(--line-strong);
    color:var(--text-dim);
    background:var(--surface);
  }
  .badge.plan{ color:var(--brass); border-color: rgba(207,155,70,0.35); background: var(--brass-soft); }

  .section-label{
    font-family:'Oswald', sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin: 30px 0 12px 0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  /* Cooldown ladder */
  .ladder-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap:14px;
  }
  .skill-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding:16px 16px 14px 16px;
  }
  .skill-card .skill-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }
  .skill-dot{
    width:32px; height:32px;
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size:14px;
    color:#0e0c16;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
    border:2px solid transparent;
  }
  .skill-dot.has-icon{
    background:var(--bg-alt) !important;
    border-color: var(--skill-color, var(--brass));
  }
  .skill-dot img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .skill-dot .letter-fallback{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .skill-name{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.06em;
  }
  .bars{ display:flex; flex-direction:column; gap:7px; }
  .bar-row{ display:flex; align-items:center; gap:8px; }
  .bar-rank{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:var(--text-faint);
    width:14px;
    text-align:right;
    flex-shrink:0;
  }
  .bar-track{
    flex:1;
    height:8px;
    background:var(--bg-alt);
    border-radius:5px;
    overflow:hidden;
    position:relative;
  }
  .bar-fill{
    height:100%;
    border-radius:5px;
    transition: width .5s cubic-bezier(.2,.7,.3,1);
  }
  .bar-val{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-dim);
    width:40px;
    text-align:right;
    flex-shrink:0;
  }
  .plain-cd{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--text-dim);
    line-height:1.5;
  }
  .subgroup{ margin-bottom:10px; }
  .subgroup:last-child{ margin-bottom:0; }
  .subgroup-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-faint);
    margin-bottom:5px;
  }

  .video-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding:14px;
  }
  .video-embed{
    position:relative;
    width:100%;
    padding-top:56.25%;
    border-radius:10px;
    overflow:hidden;
    background:var(--bg-alt);
  }
  .video-embed iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
  }
  .more-videos{
    display:inline-block;
    margin-top:12px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--brass);
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition: border-color .15s ease;
  }
  .more-videos:hover{ border-color: var(--brass); }

  .plan-list{
    list-style:none;
    margin:0; padding:0;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .plan-list li{
    background:var(--surface);
    border:1px solid var(--line);
    border-left:3px solid var(--brass);
    border-radius:10px;
    padding:13px 16px;
    font-size:14.5px;
    line-height:1.55;
    color:var(--text-dim);
  }
  .plan-list li b, .plan-list li strong{ color:var(--text); }

  .runes-box{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding:16px 18px;
    font-size:14.5px;
    color:var(--text-dim);
    line-height:1.6;
  }
  .runes-box .lbl{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    color:var(--r);
    margin-bottom:6px;
    text-transform:uppercase;
  }

  footer{
    margin-top:44px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.02em;
    line-height:1.9;
  }
  .footer-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .footer-logo{
    height:26px;
    width:auto;
    opacity:0.85;
    flex-shrink:0;
  }

  /* Mobile */
  @media (max-width: 860px){
    .app{ grid-template-columns: 1fr; }
    .sidebar{
      border-right:none;
      border-bottom:1px solid var(--line);
      max-height:46vh;
    }
    main{ padding:22px 18px 50px 18px; }
    .detail-head h2{ font-size:32px; }
  }
  @media (prefers-reduced-motion: reduce){
    .bar-fill{ transition:none; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="jax-portrait">
        <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Jax_0.jpg" alt="Jax">
      </div>
      <div>
        <div class="brand-title">
          <span class="mark">JAX</span>
          <h1>Tempos <span>&amp;</span> Trocas</h1>
        </div>
        <div class="tagline">PLANILHA 2026 — GUIA DE MATCHUPS · TOP LANE</div>
      </div>
    </div>
    <img class="site-logo" src="assets/nicklink-logo.png" alt="Nick Link">
  </div>

  <aside class="sidebar">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Buscar campeão…" autocomplete="off">
    </div>
    <div class="count-row">
      <span id="count">43 campeões</span>
      <span>ORDEM ALFABÉTICA</span>
    </div>
    <div class="roster" id="roster"></div>
  </aside>

  <main>
    <div class="detail" id="detail"></div>
  </main>
</div>

<script>
/* ============================================================
   IMAGENS — Data Dragon (CDN oficial da Riot Games para uso
   de comunidade/fã-sites). Splash arts não exigem versão;
   os ícones quadrados usam a versão de patch mais recente,
   que é atualizada automaticamente abaixo.
   ============================================================ */
let DDRAGON_VERSION = '16.13.1'; // fallback, atualizado ao carregar a página
const ddragonIcon = (id) => `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/champion/${id}.png`;
const ddragonSplash = (id, skin=0) => `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${id}_${skin}.jpg`;

fetch('https://ddragon.leagueoflegends.com/api/versions.json')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(versions => {
    if(Array.isArray(versions) && versions[0]){
      DDRAGON_VERSION = versions[0];
      document.querySelectorAll('img.champ-icon').forEach(img => {
        img.src = ddragonIcon(img.dataset.id);
      });
    }
  })
  .catch(() => { /* mantém a versão de fallback silenciosamente */ });

/* ============================================================
   DADOS — extraídos da Planilha 2026 (Jax Tempos e Trocas)
   ============================================================ */
const DATA = [
{n:1,name:"Aatrox",id:"Aatrox",yt:"jEzvYX2pGxM",tag:"Farm → All-in 6",
 cds:{P:"22 - 10",Q:"14/12/10/8/6",W:"20/18/16/14/12",E:"9/8/7/6/5",R:"120/100/80"},
 tips:[
  "Nível 1 precisamos escolher entre givar os 3 primeiros minions ou pegá-los, tentando não tomar poke do Q dele. No nível 2-3 se atente para crasharmos na 3ª wave, tomando cuidado ao dar Q/E no Aatrox pois isso prejudicaria o final da fase de ataque/wave.",
  "Nível 3-6 é só pular no Aatrox, dar o combo completo e, se for matar, usar ignite antes do R dele."
 ],
 runes:"Avanço da tempestade, manaflowbind, transcendência, chamuscar, biscoito e cdr."},
{n:2,name:"Akali",id:"Akali",yt:"X3sAv-pBcus",tag:"Poke / Farm",
 cds:{P:"2 (MS)",Q:"1.5",W:"20/19/18/17/16",E:"16/14.5/13/11.5/10",R:"120/90/60"},
 tips:[
  "Nível 1 — jogue como um Rengar, pelo rio fora da wave; tente fazê-la escolher entre te pokear ou farmar.",
  "Nível 3-6 — toda vez que você pular nela e ela usar a sombra, fuja e jogue em dois tempos.",
  "A luta começa a ficar boa depois do Negatron."
 ],
 runes:"Grasp, demolir, ventos, crescimento, biscoito e reembolso."},
{n:3,name:"Anivia",id:"Anivia",yt:"yrSFcrIBMjg",tag:"Timing Preciso",
 cds:{P:"4",Q:"11/10/9/8/7",W:"17",E:"4",R:"4/3/2"},
 tips:[
  "Nível 1 — pelo rio, tente pegá-la com o E; não troque HP por minions.",
  "Nível 3-6 — toda vez que ela der a cara, pule com EQ (não QE): é o tempo necessário para dar stun sem tomar o stun do Q dela."
 ],
 runes:"Chuva de lâminas, impacto, sexto sentido, caçador de tesouros, biscoito e cdr (tenacidade nas runinhas)."},
{n:4,name:"Camille",id:"Camille",yt:"YUGwWZX2hTM",tag:"Engaje com E",
 cds:{P:"18/14/10",Q:"9/8/7/6/5",W:"15/14/13/12/11",E:"16/15/14/13/12",R:"140/115/90"},
 tips:[
  "Nível 1 — use seu E para engajar sem deixar ela procar a passiva.",
  "Nível 3-6 — engaje sempre com QE e tente stunar ela quando for usar a corda, cancelando o dash dela."
 ],
 runes:"Ritmo, presença, aceleração, dilacerar, triple tonic e reembolso."},
{n:5,name:"Cho'Gath",id:"Chogath",yt:"o5yZrFy3nnA",tag:"Freeze",
 cds:{P:"—",Q:"6",W:"11/10.5/10/9.5/9",E:"8/7/6/5/4",R:"80/70/60"},
 tips:[
  "Nível 1 — sempre freeze, já que a lane é do Jax.",
  "Nível 3-6 — jogue QE enquanto o E estiver ligado; fique atento ao knock-up do Cho e dê passinhos para os lados, mantendo o chase."
 ],
 runes:"Avanço da tempestade, manaflowbind, transcendência, chamuscar, biscoito e cdr (tenacidade nas runinhas)."},
{n:6,name:"Darius",id:"Darius",yt:"SKbiWUIJO9k",tag:"Defensivo",
 cds:{P:"—",Q:"9/8/7/6/5",W:"5",E:"26/23.5/21/18.5/16",R:"120/100/80"},
 tips:[
  "Nível 1 — evite tomar o Q do Darius.",
  "Nível 3 — nunca pule no Darius; guarde seu pulo para o Q dele, não deixando ele curar.",
  "Nível 6 — não deixe o Darius stackar a passiva com o seu E."
 ],
 runes:"Grasp, demolir, ventos, crescimento, biscoito e reembolso."},
{n:7,name:"Dr. Mundo",id:"DrMundo",yt:"6GnVGRuSbTI",tag:"Farm → All-in",
 cds:{P:"60 - 15",Q:"4",W:"17/16.5/16/15.5/15",E:"9/8.25/7.5/6.75/6",R:"120"},
 tips:[
  "Nível 1 — foque em farmar atrás dos minions, mas tente tirar a passiva dele.",
  "Nível 3-6 — é só pular nele tirando a passiva com EQ, usando a tempestade para correr para frente ou para trás."
 ],
 runes:"Avanço da tempestade, manaflowbind, transcendência, chamuscar, biscoito e cdr."},
{n:8,name:"Fiora",id:"Fiora",yt:"zc2cIV2jG60",tag:"Timing (espera o Q)",
 cds:{P:"—",Q:"13/11.25/9.5/7.75/6",W:"24/22/20/18/16",E:"11/10/9/8/7",R:"110/90/70"},
 tips:[
  "Nível 1 — E na wave, evitando tomar o Q dela com o seu E.",
  "Nível 2 — QE, passinho pro lado, depois use o E andando pros lados antes de estourar.",
  "Nível 3 — você só vai pular nela quando ela gastar o Q."
 ],
 runes:"Ritmo, presença, aceleração, dilacerar, biscoito e cdr."},
{n:9,name:"Gangplank",id:"Gangplank",yt:"VpOLQqhnaLw",tag:"Pressão de Rio",
 cds:{P:"15",Q:"4.5",W:"22/20/18/16/14",E:"17/16/15/14/13",R:"160/140/120"},
 tips:[
  "Nível 1 — jogue pro rio, como um Rengar; puxe a wave pro rio evitando tomar o barril dele.",
  "Nível 2 — QE, e assim que estourar o E decida entre correr pra frente ou pra trás; se tiver potencial de kill, ignite e full engage."

/* ------------------------------------------------------------
   Ícones reais das habilidades (P/Q/W/E/R), buscados sob demanda
   no Data Dragon (mesma fonte oficial usada para os retratos e
   splash arts). Resultado é cacheado por campeão.
   ------------------------------------------------------------ */
const abilityIconCache = {};

async function getAbilityIcons(champ){
  if(abilityIconCache[champ.id]) return abilityIconCache[champ.id];
  try{
    const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/data/en_US/champion/${champ.id}.json`);
    if(!res.ok) throw new Error('resposta inválida');
    const json = await res.json();
    const info = json.data[champ.id];
    const icons = {
      P: `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/passive/${info.passive.image.full}`
    };
    const order = ['Q','W','E','R'];
    info.spells.forEach((s, i) => {
      icons[order[i]] = `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/spell/${s.image.full}`;
    });
    abilityIconCache[champ.id] = icons;
    return icons;
  }catch(e){
    return null;
  }
}

function applyAbilityIcons(champ){
  getAbilityIcons(champ).then(icons => {
    if(!icons || currentName !== champ.name) return;
    SKILL_ORDER.forEach(k => {
      const dot = document.querySelector(`.skill-dot[data-skill="${k}"]`);
      if(dot && icons[k]){
        dot.classList.add('has-icon');
        dot.style.setProperty('--skill-color', SKILL_COLORS[k]);
        dot.innerHTML = `<img src="${icons[k]}" alt="${k}" loading="lazy">`;
      }
    });
  });
}

/* ============================================================
   RENDER
   ============================================================ */
const SKILL_COLORS = { P:'var(--p)', Q:'var(--q)', W:'var(--w)', E:'var(--e)', R:'var(--r)' };
const SKILL_ORDER = ['P','Q','W','E','R'];

function parseRankList(raw){
  if(!raw) return null;
  const cleaned = raw.trim();
  if(cleaned === '—' || cleaned === '-') return null;
  if(cleaned.includes('|') || cleaned.includes(':') || /[a-zA-ZÀ-ÿ]{3,}/.test(cleaned.replace(/recarga|s\b/gi,''))){
    // contains descriptive text alongside numbers -> not a clean rank ladder
  }
  const tokens = cleaned.split('/').map(t => t.trim());
  if(tokens.length < 2 || tokens.length > 6) return null;
  const nums = tokens.map(t => {
    const cleanTok = t.replace(/s$/i,'').replace(',', '.').match(/-?\d+(\.\d+)?/);
    return cleanTok ? parseFloat(cleanTok[0]) : NaN;
  });
  if(nums.some(isNaN)) return null;
  return nums;
}

function renderSkillValue(raw){
  if(!raw || raw.trim() === '—' || raw.trim() === '-'){
    return `<div class="plain-cd">— não possui cooldown convencional</div>`;
  }
  if(raw.includes(' · ')){
    const parts = raw.split(' · ');
    return parts.map(p => {
      const idx = p.indexOf(':');
      if(idx === -1) return `<div class="plain-cd">${escapeHtml(p)}</div>`;
      const label = p.slice(0, idx).trim();
      const val = p.slice(idx+1).trim();
      return `<div class="subgroup"><div class="subgroup-label">${escapeHtml(label)}</div>${renderInner(val)}</div>`;
    }).join('');
  }
  return renderInner(raw);
}

function renderInner(raw){
  const nums = parseRankList(raw);
  if(nums){
    const max = Math.max(...nums);
    return `<div class="bars">` + nums.map((v,i) => {
      const pct = Math.max(8, Math.round((v/max)*100));
      return `<div class="bar-row">
        <span class="bar-rank">${i+1}</span>
        <span class="bar-track"><span class="bar-fill" style="width:${pct}%; background:var(--__color)"></span></span>
        <span class="bar-val">${v}s</span>
      </div>`;
    }).join('') + `</div>`;
  }
  return `<div class="plain-cd">${escapeHtml(raw)}</div>`;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderRoster(filter=''){
  const roster = document.getElementById('roster');
  const q = filter.trim().toLowerCase();
  const list = DATA.filter(c => c.name.toLowerCase().includes(q));
  document.getElementById('count').textContent = `${list.length} campeão${list.length===1?'':'s'}`;
  if(list.length === 0){
    roster.innerHTML = `<div class="no-results">Nenhum campeão encontrado.</div>`;
    return;
  }
  roster.innerHTML = list.map(c => `
    <button class="champ-btn ${c.name===currentName ? 'active':''}" data-name="${c.name}">
      <span class="num">${String(c.n).padStart(2,'0')}</span>
      <img class="champ-icon" data-id="${c.id}" src="${ddragonIcon(c.id)}" alt="" loading="lazy">
      <span class="name">${c.name}</span>
    </button>
  `).join('');
  roster.querySelectorAll('.champ-btn').forEach(btn => {
    btn.addEventListener('click', () => selectChampion(btn.dataset.name));
  });
}

let currentName = 'Aatrox';

function selectChampion(name){
  currentName = name;
  const c = DATA.find(d => d.name === name);
  if(!c) return;
  renderDetail(c);
  applyAbilityIcons(c);
  renderRoster(document.getElementById('search').value);
  document.querySelectorAll('.champ-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.name === name);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderDetail(c){
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div class="hero" style="background-image:url('${ddragonSplash(c.id)}')">
      <div class="hero-overlay"></div>
      <div class="detail-head">
        <div>
          <span class="id">MATCHUP ${String(c.n).padStart(2,'0')} / 43 — JAX TOP</span>
          <h2>${c.name}</h2>
        </div>
        <div class="badge-row">
          <span class="badge plan">${escapeHtml(c.tag)}</span>
        </div>
      </div>
    </div>

    <div class="section-label">Tempos das habilidades</div>
    <div class="ladder-grid">
      ${SKILL_ORDER.map(k => `
        <div class="skill-card">
          <div class="skill-top">
            <div class="skill-dot" data-skill="${k}" style="background:${SKILL_COLORS[k]}">${k}</div>
            <div class="skill-name">Cooldown por rank</div>
          </div>
          ${renderSkillValue(c.cds[k]).replaceAll('var(--__color)', SKILL_COLORS[k])}
        </div>
      `).join('')}
    </div>

    <div class="section-label">Vídeo do matchup</div>
    <div class="video-card">
      <div class="video-embed">
        <iframe src="https://www.youtube.com/embed/${c.yt}" title="Jax vs ${c.name}" frameborder="0" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <a class="more-videos" href="https://www.youtube.com/results?search_query=${encodeURIComponent('Jax vs ' + c.name + ' matchup top lane')}" target="_blank" rel="noopener">Ver mais vídeos desse matchup no YouTube →</a>
    </div>

    <div class="section-label">Como jogar a lane</div>
    <ul class="plan-list">
      ${c.tips.map(t => `<li>${escapeHtml(t)}</li>`).join('')}
    </ul>

    <div class="section-label">Runas</div>
    <div class="runes-box">
      <span class="lbl">Sugestão de página de runas</span>
      ${escapeHtml(c.runes)}
    </div>

    <footer>
      <div class="footer-row">
        <span>PLANILHA 2026 — MATCHUPS DE JAX · TEMPOS E TROCAS · DADOS PODEM MUDAR APÓS ATUALIZAÇÕES DO JOGO<br>Desenvolvido por Werbiston Júnior</span>
        <img class="footer-logo" src="assets/nicklink-logo.png" alt="Nick Link">
      </div>
    </footer>
  `;
}

document.getElementById('search').addEventListener('input', (e) => {
  renderRoster(e.target.value);
});

// init
renderRoster();
selectChampion('Aatrox');
</script>
</body>
</html>
